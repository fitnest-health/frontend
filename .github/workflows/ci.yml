on:
  push:
    branches:
      - development

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/development'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .

          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fitnest-frontend:development
            ghcr.io/${{ github.repository_owner }}/fitnest-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-helm-chart:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout chart repository
        uses: actions/checkout@v4
        with:
          repository: fitnest-chart/frontend
          ref: development
          path: helm-repo
          ssh-key: ${{ secrets.CHART_REPO_SSH_PRIVATE_KEY }}

      - name: Update image tag in values.yaml
        run: |
          cd helm-repo
          sed -i 's/tag: .*/tag: "${{ github.sha }}"/' values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add values.yaml
          git commit -m "chore: update frontend image tag to ${{ github.sha }}"
          git push origin development

  sync-argocd:
    needs: update-helm-chart
    runs-on: ubuntu-latest
    steps:
      - name: Prepare ArgoCD token
        env:
          ARGOCD_TOKEN_RAW: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          CLEAN_TOKEN="$ARGOCD_TOKEN_RAW"
          CLEAN_TOKEN="${CLEAN_TOKEN%\"}"
          CLEAN_TOKEN="${CLEAN_TOKEN#\"}"
          echo "ARGOCD_TOKEN=$CLEAN_TOKEN" >> $GITHUB_ENV

      - name: Trigger ArgoCD Sync
        run: |
          curl -k -X POST \
            -H "Authorization: Bearer ${{ env.ARGOCD_TOKEN }}" \
            -H "Content-Type: application/json" \
            http://161.97.183.7:31052/api/v1/applications/fitnest-frontend-dev/sync \
            -d '{}'

